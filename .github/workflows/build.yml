name: Build & Release

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packaging/windows/requirements-windows.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: python packaging/windows/build_exe.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: FBT-Server-Windows
          path: dist/FBT-Server/
          retention-days: 30

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libusb-1.0-0-dev libturbojpeg0-dev libglfw3-dev \
            libopenni2-dev libva-dev libjpeg-dev \
            python3-tk libgl1-mesa-glx

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mediapipe opencv-python numpy python-osc flask Pillow pyinstaller

      - name: Build with PyInstaller
        run: |
          chmod +x packaging/linux/build_linux.sh
          bash packaging/linux/build_linux.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: FBT-Server-Linux
          path: dist/FBT-Server/
          retention-days: 30

  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: quest_app
        run: |
          chmod +x gradlew 2>/dev/null || true
          # Generate gradle wrapper if missing
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.4
          fi
          ./gradlew assembleDebug

      - name: Build release APK
        working-directory: quest_app
        run: ./gradlew assembleRelease || echo "Release build failed (no signing key), using debug APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FBT-Quest-APK
          path: |
            quest_app/app/build/outputs/apk/debug/*.apk
            quest_app/app/build/outputs/apk/release/*.apk
          retention-days: 30

  release:
    needs: [build-windows, build-linux, build-apk]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: FBT-Server-Windows
          path: windows-build/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: FBT-Server-Linux
          path: linux-build/

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: FBT-Quest-APK
          path: apk-build/

      - name: Create archives
        run: |
          cd windows-build && zip -r ../FBT-Server-Windows.zip . && cd ..
          cd linux-build && tar czf ../FBT-Server-Linux.tar.gz . && cd ..
          # Find APKs and copy to release root
          find apk-build -name "*.apk" -exec cp {} . \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FBT-Server-Windows.zip
            FBT-Server-Linux.tar.gz
            *.apk
          generate_release_notes: true
          draft: false
          prerelease: false
